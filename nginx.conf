server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security: block sensitive file/directory access with proper 404
    location ~* (^/\.env|^/\.git|^/\.env\.|\.php$|^/config\.php|^/aws[\.-]config|^/backend/|^/admin/\.env|^/wp-login) {
        return 404;
    }

    # Block dot files (hidden files) except favicon
    location ^~ /.well-known/ {
        allow all;
        default_type application/json;
        types { } # ensure default_type is used for extensionless files
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # Static assets - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static about page for Google OAuth verification (no JS needed)
    location = /about {
        try_files /about.html =404;
    }

    # SPA fallback - ONLY for actual app routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    # Enforcing CSP — broad https: allowlist to keep Supabase, Cloudinary, Stripe, OAuth popups working.
    # img-src/media-src include blob: so freshly-uploaded media previews render
    # before the Cloudinary https: URL is available (object URLs created from the
    # selected File via URL.createObjectURL).
    # connect-src wss://api.postora.cloud (primary) and wss://supabase.postora.cloud
    # (backup alias) are scoped (not wss:*) for the
    # Supabase Realtime WebSocket; worker-src 'self' blob: allows the in-browser
    # worker the Realtime runtime spawns.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' https:; connect-src 'self' https: wss://api.postora.cloud wss://supabase.postora.cloud; worker-src 'self' blob:; frame-ancestors 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
